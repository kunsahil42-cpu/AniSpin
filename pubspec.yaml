name: anispin
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Fonts
  google_fonts: ^6.3.0

  # SVG Icons
  flutter_svg: ^2.2.0

  # Animations
  lottie: ^3.3.1
  animated_text_kit: ^4.2.3
  animations: ^2.0.11
  flutter_animate: ^4.5.2

  # GraphQL (AniList API)
  graphql_flutter: ^5.2.0

  # Network Images
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/